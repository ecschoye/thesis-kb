// --- Persistence ---
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem("tkb_history") || "[]"); } catch { return []; }
}
function saveHistory(h) {
  // Keep only the last 50 conversations to prevent localStorage bloat
  const trimmed = h.length > 50 ? h.slice(-50) : h;
  localStorage.setItem("tkb_history", JSON.stringify(trimmed));
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem("tkb_settings"));

    n_retrieve: 30,

function chatTitle(chat) {
  if (chat.title) return chat.title;
  const first = chat.messages.find((m) => m.role === "user");
  if (first) return first.content.slice(0, 50) + (first.content.length > 50 ? "..." : "");
  return "New chat";
}

function generateBibTeX(sources) {
  return sources
    .filter((s) => s.arxiv_id)
    .map((s) => {
      const key = s.bibtex_key || s.arxiv_id.replace(/[.\/:]/g, "_");
      const authors = s.paper_authors || "Unknown";
      const title = s.paper_title || "Untitled";
      const year = s.paper_year || "????";
      return `@article{${key},\n  title={${title}},\n  author={${authors}},\n  year={${year}},\n  eprint={${s.arxiv_id}},\n  archivePrefix={arXiv}\n}`;
    })
    .join("\n\n");
}

function exportChatMarkdown(messages, mode, variants) {
  let md = `# Thesis KB Chat — ${mode.toUpperCase()} mode\n\n`;
  md += `*Exported ${new Date().toLocaleString()}*\n\n---\n\n`;
  for (const msg of messages) {
    if (msg.role === "user") {
      md += `## User\n\n${msg.content}\n\n`;
    } else {
      md += `## Assistant (${mode})\n\n${msg.content}\n\n`;
      if (msg.sources && msg.sources.length > 0) {
        md += `### Sources (${msg.sources.length})\n\n`;
        for (const s of msg.sources) {
          md += `- **${s.paper_title || s.paper_id}** (${s.paper_year || "?"}) — ${s.type} — score ${s.rrf_score?.toFixed(3) || "?"}\n`;
          if (s.bibtex_key) md += `  - BibTeX key: \`${s.bibtex_key}\`\n`;
        }
        md += `\n#### BibTeX\n\n\`\`\`bibtex\n${generateBibTeX(msg.sources)}\n\`\`\`\n\n`;
      }
    }
    md += "---\n\n";
  }
  return md;
}

function extractFollowUps(content) {
  if (!content) return { cleanContent: content, followUps: [] };
  const marker = "### Suggested Follow-ups";
  const idx = content.indexOf(marker);
  if (idx === -1) return { cleanContent: content, followUps: [] };
  const before = content.slice(0, idx).trimEnd();
  const after = content.slice(idx + marker.length);
  const bullets = [];
  for (const line of after.split("\n")) {
    const m = line.match(/^[-*]\s+(.+)/);
    if (m) bullets.push(m[1].trim());
  }
  return { cleanContent: before, followUps: bullets };
}

function highlightNuggetInChunk(chunkText, nuggetDoc) {
  // Extract the answer portion from "Q: ... A: ..." format
  const aMatch = nuggetDoc && nuggetDoc.match(/A:\s*([\s\S]+)/);
  const answer = aMatch ? aMatch[1].trim() : (nuggetDoc || "").trim();
  if (!answer || answer.length < 20) return chunkText;
  // Try to find longest common substring (use first 120 chars of answer for matching)
  const needle = answer.slice(0, 120).toLowerCase().replace(/\s+/g, " ");
  const haystack = chunkText.toLowerCase().replace(/\s+/g, " ");
  // Sliding window fuzzy match
  let bestStart = -1, bestLen = 0;
  for (let winLen = Math.min(needle.length, haystack.length); winLen >= 30; winLen -= 5) {
    for (let i = 0; i <= haystack.length - winLen; i++) {
      const sub = haystack.slice(i, i + winLen);
      let matches = 0;
      for (let j = 0; j < Math.min(sub.length, needle.length); j++) {
        if (sub[j] === needle[j]) matches++;
      }
      if (matches / winLen > 0.7 && winLen > bestLen) {
        bestStart = i; bestLen = winLen; break;
      }
    }
    if (bestLen > 0) break;
  }
  if (bestStart < 0) return chunkText;
  // Map back to original text positions (accounting for whitespace normalization)
  let origStart = 0, normIdx = 0;
  const origChars = chunkText.split("");
  let mappedStart = -1, mappedEnd = -1;
  for (let i = 0; i < origChars.length && normIdx <= bestStart + bestLen; i++) {
    if (normIdx === bestStart && mappedStart < 0) mappedStart = i;
    if (normIdx === bestStart + bestLen) { mappedEnd = i; break; }
    if (/\s/.test(origChars[i])) {
      // Skip consecutive whitespace
      while (i + 1 < origChars.length && /\s/.test(origChars[i + 1])) i++;
      normIdx++;
    } else {
      normIdx++;
    }
  }
  if (mappedStart < 0) return chunkText;
  if (mappedEnd < 0) mappedEnd = chunkText.length;
  return [
    chunkText.slice(0, mappedStart),
    "\u2588HIGHLIGHT_START\u2588",
    chunkText.slice(mappedStart, mappedEnd),
    "\u2588HIGHLIGHT_END\u2588",
    chunkText.slice(mappedEnd),
  ].join("");
}

function ChunkExpander({ nugget }) {
  const [chunkText, setChunkText] = useState(null);
  const [loading, setLoading] = useState(false);
  if (nugget.source_chunk == null) return null;
  const toggle = (e) => {
    e.stopPropagation();
    if (chunkText !== null) { setChunkText(null); return; }
    setLoading(true);
    fetch(`${API_BASE}/api/chunk/${nugget.paper_id}/${nugget.source_chunk}`)
      .then(r => r.json())
      .then(d => { setChunkText(d.text || "No text found"); setLoading(false); })
      .catch(() => { setChunkText("Failed to load chunk"); setLoading(false); });
  };
  const rendered = useMemo(() => {
    if (!chunkText) return null;
    const highlighted = highlightNuggetInChunk(chunkText, nugget.document);
    const parts = highlighted.split(/\u2588HIGHLIGHT_START\u2588|\u2588HIGHLIGHT_END\u2588/);
    if (parts.length === 3) {
      return React.createElement("span", null,
        parts[0],
        React.createElement("mark", { className: "bg-yellow-200 dark:bg-yellow-800/60 rounded px-0.5" }, parts[1]),
        parts[2]
      );
    }
    return chunkText;
  }, [chunkText, nugget.document]);
  return (
    <span>
      <button onClick={toggle} className="text-purple-500 hover:text-purple-700 dark:text-purple-400 text-xs ml-2">
        {loading ? "loading..." : chunkText !== null ? "hide context" : "show context"}
      </button>
      {chunkText !== null && (
        <div className="mt-1 p-2 bg-purple-50 dark:bg-purple-900/20 rounded text-gray-600 dark:text-gray-400 whitespace-pre-wrap leading-relaxed text-xs border border-purple-100 dark:border-purple-800">
          {rendered}
        </div>
      )}
    </span>
  );
}

const SourceCard = memo(function SourceCard({ nugget, variants, forceExpand, bookmarks, setBookmarks, rejected, onReject, query, mode }) {

  const isRejected = rejected && rejected.has(nugget.nugget_id);

const GroupedSourcesView = memo(function GroupedSourcesView({ sources, variants, bookmarks, setBookmarks, rejected, onReject }) {
  const [expandedPapers, setExpandedPapers] = useState(new Set());
  const [expandedNuggets, setExpandedNuggets] = useState(new Set());

  // Group sources by paper (memoized to avoid re-sorting on every render)
  const papers = useMemo(() => {
    const grouped = {};
    for (const s of sources) {
      const key = s.paper_id || s.paper_title || "unknown";
      if (!grouped[key]) grouped[key] = { paper: s, nuggets: [] };
      grouped[key].nuggets.push(s);
    }
    return Object.values(grouped).sort((a, b) => Math.max(...b.nuggets.map(n => n.rrf_score)) - Math.max(...a.nuggets.map(n => n.rrf_score)));
  }, [sources]);

  const togglePaper = (key) => {
    setExpandedPapers((prev) => { const n = new Set(prev); if (n.has(key)) n.delete(key); else n.add(key); return n; });
  };
  const toggleNugget = (id) => {
    setExpandedNuggets((prev) => { const n = new Set(prev); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  };

  return (
    <div className="mt-2 border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden bg-white dark:bg-gray-800">
      {papers.map(({ paper, nuggets }, pi) => {
        const paperKey = paper.paper_id || pi;
        const isOpen = expandedPapers.has(paperKey);
        const isRejectedAll = rejected && nuggets.every(n => rejected.has(n.nugget_id));
        return (
          <div key={paperKey} className={`border-b border-gray-100 dark:border-gray-700 last:border-0 ${isRejectedAll ? "opacity-50" : ""}`}>
            <div className="flex items-center gap-2 px-2 py-1.5 text-xs hover:bg-gray-50 dark:hover:bg-gray-800/50 cursor-pointer" onClick={() => togglePaper(paperKey)}>
              <svg className={`w-3 h-3 transition-transform flex-shrink-0 text-gray-400 ${isOpen ? "rotate-90" : ""}`} viewBox="0 0 12 12">
                <path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" strokeWidth="1.5" />
              </svg>
              <span className="font-medium text-gray-700 dark:text-gray-300 flex-1 truncate">{paper.paper_title || paper.paper_id}</span>
              <span className="text-gray-400">{paper.paper_year || "\u2014"}</span>
              <span className="text-gray-400 bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded">{nuggets.length} nugget{nuggets.length > 1 ? "s" : ""}</span>

            </div>
            {isOpen && (
              <div className="pl-5 pr-2 pb-1">
                {nuggets.map((n, ni) => {
                  const nIsRejected = rejected && rejected.has(n.nugget_id);
                  const nIsExpanded = expandedNuggets.has(n.nugget_id);
                  return (
                    <div key={n.nugget_id || ni} className={`border-l-2 border-gray-200 dark:border-gray-600 pl-2 py-1 ${nIsRejected ? "opacity-50" : ""}`}>
                      <div className="flex items-center gap-2 text-xs">
                        <button onClick={() => toggleNugget(n.nugget_id)} className="text-gray-400 hover:text-blue-500">
                          <svg className={`w-2.5 h-2.5 transition-transform ${nIsExpanded ? "rotate-90" : ""}`} viewBox="0 0 12 12">
                            <path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" strokeWidth="1.5" />
                          </svg>
                        </button>
                        <ConfidenceDot confidence={n.confidence} />
                        <TypePill type={n.type} />
                        <span className="text-gray-400 flex-1">{n.rrf_score.toFixed(3)}</span>
                        <span className="text-gray-400">{n.overlap_count}/{n.n_variants}</span>
                        {onReject && <RejectButton nuggetId={n.nugget_id} rejected={rejected} onReject={onReject} />}

const MessageBubble = memo(function MessageBubble({ msg, mode, bookmarks, setBookmarks, onFollowUp, onRegenerate, onRedo, regenerating }) {
  const isUser = msg.role === "user";
  const htmlRef = useRef(null);
  const [showRaw, setShowRaw] = useState(false);
  const [rejected, setRejected] = useState(new Set());
  const displayMode = msg.mode || mode;
  const mc = MODE_COLORS[displayMode] || MODE_COLORS.survey;
  const { cleanContent, followUps } = useMemo(() => extractFollowUps(msg.content), [msg.content]);

  const handleReject = (nuggetId) => {
    setRejected((prev) => {
      const next = new Set(prev);
      if (next.has(nuggetId)) next.delete(nuggetId);
      else next.add(nuggetId);
      return next;
    });
  };

  const handleRegenerate = () => {
    if (onRegenerate && rejected.size > 0) {
      // Collect paper_ids of rejected nuggets so entire papers are excluded
      const rejectedPapers = new Set();
      if (msg.sources) {
        for (const s of msg.sources) {
          if (rejected.has(s.nugget_id) && s.paper_id) {
            rejectedPapers.add(s.paper_id);
          }
        }
      }
      onRegenerate(Array.from(rejected), Array.from(rejectedPapers));
    }
  };

  useEffect(() => {
    if (!isUser && htmlRef.current) {
      htmlRef.current.innerHTML = DOMPurify.sanitize(marked.parse(cleanContent || ""));
    }
  }, [cleanContent, isUser]);

  return (
    <div className={`flex ${isUser ? "justify-end" : "justify-start"} mb-3`}>

function PaperSearch({ pinnedPapers, setPinnedPapers, onClose }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const inputRef = useRef(null);
  const debounceRef = useRef(null);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  useEffect(() => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (!query.trim()) { setResults([]); return; }
    debounceRef.current = setTimeout(async () => {
      setLoading(true);
      try {
        const resp = await fetch(`${API_BASE}/api/papers/search?q=${encodeURIComponent(query.trim())}&limit=8`);
        if (resp.ok) setResults(await resp.json());
      } catch {}
      setLoading(false);
    }, 300);
    return () => clearTimeout(debounceRef.current);
  }, [query]);

  const pinnedIds = new Set(pinnedPapers.map(p => p.paper_id));

  const addPaper = (paper) => {
    if (pinnedIds.has(paper.paper_id)) return;
    setPinnedPapers(prev => [...prev, paper]);
    setQuery("");
    setResults([]);
  };

  return (
    <div className="px-4 pt-2 pb-1">
      <div className="relative">
        <input
          ref={inputRef}
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Escape") onClose(); }}
          placeholder="Search papers by title, author, or year..."
          className="w-full text-sm px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:border-indigo-400"
        />
        {loading && <span className="absolute right-3 top-2 text-xs text-gray-400">...</span>}
        {results.length > 0 && (
          <div className="absolute left-0 right-0 bottom-full mb-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg max-h-64 overflow-y-auto z-50">
            {results.map((p) => {
              const isPinned = pinnedIds.has(p.paper_id);
              const authors = (p.authors || "").split(",")[0].trim();
              const title = p.title && p.title.length > 60 ? p.title.slice(0, 57) + "..." : p.title;
              return (
                <button
                  key={p.paper_id}
                  onClick={() => addPaper(p)}
                  className={`w-full text-left px-3 py-2 text-xs hover:bg-gray-50 dark:hover:bg-gray-700 border-b border-gray-100 dark:border-gray-700 last:border-0 flex items-center gap-2 ${isPinned ? "opacity-50" : ""}`}
                >
                  {isPinned && <span className="text-indigo-500 flex-shrink-0">✓</span>}
                  <span className="flex-1 truncate text-gray-700 dark:text-gray-300">{title}</span>
                  <span className="text-gray-400 flex-shrink-0 whitespace-nowrap">{authors}{p.year ? `, ${p.year}` : ""}</span>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function PinnedPaperChips({ pinnedPapers, setPinnedPapers }) {
  if (pinnedPapers.length === 0) return null;
  return (
    <div className="flex flex-wrap gap-1 px-4 pt-2" style={{ maxHeight: "64px", overflowY: "auto" }}>
      {pinnedPapers.map((p) => {
        const title = p.title && p.title.length > 40 ? p.title.slice(0, 37) + "..." : p.title;
        return (
          <span key={p.paper_id} className="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400">
            {title} · {p.year || "?"}
            <button onClick={() => setPinnedPapers(prev => prev.filter(pp => pp.paper_id !== p.paper_id))} className="hover:text-indigo-800 dark:hover:text-indigo-200 ml-0.5">×</button>
          </span>
        );
      })}
    </div>
  );
}

function App() {
  const [sidebarTab, setSidebarTab] = useState(loadSidebarTab);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState(loadInput);
  const [streaming, setStreaming] = useState(false);
  const [mode, setMode] = useState(loadMode);
  const [latexMode, setLatexMode] = useState(loadLatexMode);
  const [rerankMode, setRerankMode] = useState(loadRerankMode);
  const [settings, setSettings] = useState(loadSettings);
  const [health, setHealth] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [chatHistory, setChatHistory] = useState(loadHistory);
  const [activeChatId, setActiveChatId] = useState(null);
  const [bookmarks, setBookmarks] = useState(loadBookmarks);
  const [dark, setDark] = useState(loadDarkMode);
  const [pipelineStage, setPipelineStage] = useState(null);
  const [pinnedPapers, setPinnedPapers] = useState([]);
  const [showPaperSearch, setShowPaperSearch] = useState(false);
  const chatEndRef = useRef(null);
  const textareaRef = useRef(null);
  const abortRef = useRef(null);

  // Dark mode class on html element
  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    saveDarkMode(dark);
  }, [dark]);

  // Save settings when they change
  useEffect(() => { saveSettings(settings); }, [settings]);
  useEffect(() => { saveMode(mode); }, [mode]);
  useEffect(() => { saveLatexMode(latexMode); }, [latexMode]);
  useEffect(() => { saveRerankMode(rerankMode); }, [rerankMode]);
  useEffect(() => { saveSidebarTab(sidebarTab); }, [sidebarTab]);
  useEffect(() => {
    const t = setTimeout(() => saveInput(input), 300);
    return () => clearTimeout(t);
  }, [input]);

  const addToast = useCallback((message, type = "error") => {
    const id = Date.now();
    setToasts((prev) => [...prev, { id, message, type }]);
  }, []);
  const removeToast = useCallback((id) => {
    setToasts((prev) => prev.filter((t) => t.id !== id));
  }, []);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, streaming]);

  useEffect(() => {
    fetch(`${API_BASE}/health`).then((r) => r.json()).then(setHealth).catch(() => setHealth({ status: "offline" }));
  }, []);

  useEffect(() => {
    if (textareaRef.current) {
      textareaRef.current.style.height = "auto";
      textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 200) + "px";
    }
  }, [input]);

  useEffect(() => {
    if (!activeChatId || messages.length === 0) return;
    setChatHistory((prev) => {
      const updated = prev.map((c) => c.id === activeChatId ? { ...c, messages, mode, updatedAt: Date.now() } : c);
      saveHistory(updated);
      return updated;
    });
  }, [messages, activeChatId]);

  // Keyboard shortcuts: Ctrl+1-8 for modes, Ctrl+N for new chat
  useEffect(() => {
    const handler = (e) => {
      // Don't intercept if typing in input
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
      if ((e.ctrlKey || e.metaKey) && e.key >= "1" && e.key <= "8") {
        e.preventDefault();
        const idx = parseInt(e.key) - 1;
        if (MODES[idx]) handleModeChange(MODES[idx].id);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "n") {
        e.preventDefault();
        startNewChat();
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [mode, messages]);

  const startNewChat = () => { setActiveChatId(null); setMessages([]); setPinnedPapers([]); };
  const loadChat = (chat) => { setActiveChatId(chat.id); setMessages(chat.messages.map(m => m.id ? m : { ...m, id: nextMsgId() })); setMode(chat.mode); };
  const deleteChat = (chatId, e) => {
    e.stopPropagation();
    setChatHistory((prev) => { const updated = prev.filter((c) => c.id !== chatId); saveHistory(updated); return updated; });
    if (activeChatId === chatId) { setActiveChatId(null); setMessages([]); }
  };
  const handleModeChange = (newMode) => {
    if (newMode === mode) return;
    setMode(newMode);
    if (messages.length > 0) startNewChat();
  };
  const stopStreaming = () => { if (abortRef.current) { abortRef.current.abort(); abortRef.current = null; } };
  const handleFollowUp = (text) => { setInput(text); if (textareaRef.current) textareaRef.current.focus(); };
  const [regeneratingIdx, setRegeneratingIdx] = useState(null);

  const handleExport = () => {
    const md = exportChatMarkdown(messages, mode);
    const blob = new Blob([md], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `thesis-kb-${mode}-${new Date().toISOString().slice(0, 10)}.md`;
    a.click();
    URL.revokeObjectURL(url);
    addToast("Chat exported as markdown", "success");
  };

  const regenerateMessage = useCallback(async (msgIdx, excludedNuggets, excludedPapers = [], overrideMode = null) => {
    if (streaming || regeneratingIdx !== null) return;

    const conversationUpToHere = messages.slice(0, msgIdx);
    const userMessages = conversationUpToHere.filter((m) => m.role === "user");
    if (userMessages.length === 0) return;

    const allExcluded = [...excludedNuggets];
    const allExcludedPapers = [...excludedPapers];
    const effectiveMode = overrideMode || mode;

    setRegeneratingIdx(msgIdx);
    setPipelineStage("expanding");

    setMessages((prev) => {
      const updated = [...prev];
      updated[msgIdx] = { ...updated[msgIdx], content: "", sources: null, mode: effectiveMode };
      return updated;
    });

    try {
      const controller = new AbortController();
      abortRef.current = controller;

      const body = {
        messages: conversationUpToHere.map((m) => ({ role: m.role, content: m.content })),
        mode: effectiveMode,
        n_variants: settings.n_variants,
        n_retrieve: settings.n_retrieve,
        n_context: settings.n_context,
        max_per_paper: settings.max_per_paper || 3,
        model: settings.model,
        latex_mode: latexMode,
        rerank: rerankMode,
        rerank_weight: settings.rerank_weight ?? 0.6,
        rerank_top_n: settings.rerank_top_n ?? 60,
        excluded_nuggets: allExcluded,
        excluded_papers: allExcludedPapers,
      };
      if (settings.type_filter && settings.type_filter.length > 0) body.type_filter = settings.type_filter;
      if (settings.year_min) body.year_min = parseInt(settings.year_min);
      if (settings.year_max) body.year_max = parseInt(settings.year_max);
      if (pinnedPapers.length > 0) body.pinned_papers = pinnedPapers.map(p => p.paper_id);

      setPipelineStage("retrieving");
      const resp = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal: controller.signal,
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(errData.detail || resp.statusText);
      }

      setPipelineStage("generating");
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          let parsed;
          try { parsed = JSON.parse(line.slice(6)); } catch { continue; }

          if (parsed.type === "delta") {
            setMessages((prev) => {
              const updated = [...prev];
              updated[msgIdx] = { ...updated[msgIdx], content: updated[msgIdx].content + parsed.content };
              return updated;
            });
          } else if (parsed.type === "sources") {
            setMessages((prev) => {
              const updated = [...prev];
              updated[msgIdx] = { ...updated[msgIdx], sources: parsed.nuggets, variants: parsed.variants || [] };
              return updated;
            });
          } else if (parsed.type === "error") {
            addToast(parsed.content, "error");
          }
        }
      }
    } catch (e) {
      if (e.name !== "AbortError") addToast(e.message, "error");
    } finally {
      setRegeneratingIdx(null);
      setPipelineStage(null);
      abortRef.current = null;
    }
  }, [messages, streaming, regeneratingIdx, mode, settings, latexMode, rerankMode, pinnedPapers]);

  const sendMessage = useCallback(async () => {
    const text = input.trim();
    if (!text || streaming) return;

    let currentChatId = activeChatId;
    if (!currentChatId) {
      const id = generateId();
      const newChat = { id, mode, messages: [], createdAt: Date.now(), updatedAt: Date.now() };
      setChatHistory((prev) => { const updated = [newChat, ...prev]; saveHistory(updated); return updated; });
      setActiveChatId(id);
      currentChatId = id;
    }

    const userMsg = { id: nextMsgId(), role: "user", content: text };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setStreaming(true);
    setPipelineStage("expanding");

    const assistantIdx = newMessages.length;
    setMessages((prev) => [...prev, { id: nextMsgId(), role: "assistant", content: "", sources: null, mode }]);

    try {
      const controller = new AbortController();
      abortRef.current = controller;

      const body = {
        messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
        mode,
        n_variants: settings.n_variants,
        n_retrieve: settings.n_retrieve,
        n_context: settings.n_context,
        max_per_paper: settings.max_per_paper || 3,
        model: settings.model,
        latex_mode: latexMode,
        rerank: rerankMode,
        rerank_weight: settings.rerank_weight ?? 0.6,
        rerank_top_n: settings.rerank_top_n ?? 60,
      };
      if (settings.type_filter && settings.type_filter.length > 0) body.type_filter = settings.type_filter;
      if (settings.year_min) body.year_min = parseInt(settings.year_min);
      if (settings.year_max) body.year_max = parseInt(settings.year_max);
      if (pinnedPapers.length > 0) body.pinned_papers = pinnedPapers.map(p => p.paper_id);

      setPipelineStage("retrieving");
      const resp = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal: controller.signal,
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(errData.detail || resp.statusText);
      }

      setPipelineStage("generating");
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          let parsed;
          try { parsed = JSON.parse(line.slice(6)); } catch { continue; }

          if (parsed.type === "delta") {
            setMessages((prev) => {
              const updated = [...prev];
              updated[assistantIdx] = { ...updated[assistantIdx], content: updated[assistantIdx].content + parsed.content };
              return updated;
            });
          } else if (parsed.type === "sources") {
            setMessages((prev) => {
              const updated = [...prev];
              updated[assistantIdx] = { ...updated[assistantIdx], sources: parsed.nuggets, variants: parsed.variants || [] };
              return updated;
            });
          } else if (parsed.type === "error") {
            addToast(parsed.content, "error");
          }
        }
      }
    } catch (e) {
      if (e.name !== "AbortError") addToast(e.message, "error");
    } finally {
      setStreaming(false);
      setPipelineStage(null);
      abortRef.current = null;
    }
  }, [input, messages, streaming, mode, settings, activeChatId, latexMode, rerankMode, pinnedPapers]);

  const handleKeyDown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  const statusColor = health?.status === "ok" ? "bg-green-500" : health?.status === "degraded" ? "bg-yellow-500" : "bg-red-500";
  const mc = MODE_COLORS[mode] || MODE_COLORS.survey;

  const ALL_TYPES = ["method", "result", "comparison", "limitation", "background", "claim"];

  return (
    <div className="flex h-screen">
      {/* Sidebar */}
      <div className="w-56 flex-shrink-0 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col" role="navigation" aria-label="Sidebar">
        <div className="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
          <h1 className="font-bold text-sm text-gray-800 dark:text-gray-200">Thesis KB</h1>
          <div className="flex items-center gap-2 text-xs text-gray-400">
            <button onClick={() => setDark(!dark)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" title={dark ? "Light mode" : "Dark mode"}>
              {dark ? (
                <svg className="w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="4" /><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" stroke="currentColor" strokeWidth="1" /></svg>
              ) : (
                <svg className="w-3.5 h-3.5" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 105.3 11.6A5.5 5.5 0 014.4 2.7 7 7 0 008 1z" /></svg>
              )}
            </button>
            {health && health.status !== "offline" && <span>{health.nuggets?.toLocaleString()}n</span>}
            <div className={`w-2 h-2 rounded-full ${statusColor}`} title={health?.status || "unknown"} />
          </div>
        </div>

        <div className="flex border-b border-gray-200 dark:border-gray-700" role="tablist" aria-label="Sidebar tabs">
          {["chat", "settings", "stats"].map((tab) => (
            <button key={tab} onClick={() => setSidebarTab(tab)} role="tab" aria-selected={sidebarTab === tab} aria-controls={`tabpanel-${tab}`} className={`flex-1 py-2 text-xs font-medium transition-colors ${sidebarTab === tab ? "text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400" : "text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"}`}>
              {tab.charAt(0).toUpperCase() + tab.slice(1)}
            </button>
          ))}
        </div>

        <div className="flex-1 overflow-y-auto">
          {sidebarTab === "chat" ? (
            <div className="flex flex-col h-full">
              <div className="p-3 border-b border-gray-100 dark:border-gray-700">
                <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Mode <span className="normal-case text-gray-300 dark:text-gray-600">(Ctrl+1-8)</span></div>
                <div className="space-y-0.5" role="radiogroup" aria-label="Chat mode">
                  {MODES.map((m, i) => {
                    const c = MODE_COLORS[m.id];
                    return (
                      <button key={m.id} onClick={() => handleModeChange(m.id)} role="radio" aria-checked={mode === m.id} className={`w-full text-left px-2.5 py-1.5 rounded-md text-xs transition-colors ${mode === m.id ? `${c.bg} ${c.text} font-semibold` : "text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700"}`}>
                        <span className="text-gray-300 dark:text-gray-600 mr-1">{i + 1}</span>
                        <span>{m.label}</span>
                        <span className="text-gray-400 font-normal ml-1">&mdash; {m.desc}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="px-3 pt-3 pb-1 flex gap-1">
                <button onClick={startNewChat} className="flex-1 flex items-center gap-2 px-2.5 py-1.5 rounded-md text-xs text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                  <svg className="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="8" y1="3" x2="8" y2="13" /><line x1="3" y1="8" x2="13" y2="8" /></svg>
                  New chat
                </button>
                {messages.length > 0 && (
                  <button onClick={handleExport} className="flex items-center gap-1 px-2 py-1.5 rounded-md text-xs text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-gray-600 dark:hover:text-gray-300 transition-colors" title="Export as markdown">
                    <svg className="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 10v3h10v-3M8 2v8M5 7l3 3 3-3" /></svg>
                  </button>
                )}
              </div>

              <div className="flex-1 overflow-y-auto px-3 pb-3">
                {chatHistory.length === 0 ? (
                  <div className="text-xs text-gray-300 dark:text-gray-600 text-center mt-4">No chat history</div>
                ) : (
                  <div className="space-y-0.5">
                    {chatHistory.map((chat) => {
                      const hc = MODE_COLORS[chat.mode] || MODE_COLORS.survey;
                      return (
                        <div key={chat.id} onClick={() => loadChat(chat)} className={`group flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-xs cursor-pointer transition-colors ${activeChatId === chat.id ? `${hc.bg} ${hc.text}` : "text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700"}`}>
                          <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${hc.dot}`} title={chat.mode} />
                          <span className="flex-1 truncate">{chatTitle(chat)}</span>
                          <button onClick={(e) => deleteChat(chat.id, e)} className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition-opacity flex-shrink-0" title="Delete chat">
                            <svg className="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="3" y1="3" x2="9" y2="9" /><line x1="9" y1="3" x2="3" y2="9" /></svg>
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {bookmarks.length > 0 && (
                <div className="border-t border-gray-100 dark:border-gray-700 px-3 py-2">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs text-gray-400 uppercase tracking-wider">Bookmarks ({bookmarks.length})</span>
                    <button onClick={() => { navigator.clipboard.writeText(generateBibTeX(bookmarks)); addToast("BibTeX copied!", "success"); }} className="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">BibTeX</button>
                  </div>
                  <div className="space-y-0.5 max-h-32 overflow-y-auto">
                    {bookmarks.map((b) => (
                      <div key={b.nugget_id} className="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400">
                        <button onClick={() => setBookmarks((prev) => { const next = prev.filter((x) => x.nugget_id !== b.nugget_id); saveBookmarks(next); return next; })} className="text-yellow-500 hover:text-yellow-600 flex-shrink-0">
                          <svg className="w-3 h-3" viewBox="0 0 16 16" fill="currentColor" stroke="currentColor" strokeWidth="1.5"><path d="M4 2h8a1 1 0 011 1v11l-4.5-3L4 14V3a1 1 0 011-1z" /></svg>
                        </button>
                        <span className="truncate">{b.paper_title || b.nugget_id}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ) : sidebarTab === "settings" ? (
            <div className="p-4 space-y-4">
              <div>
                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">Model</label>
                <select value={settings.model} onChange={(e) => setSettings({ ...settings, model: e.target.value })} className="w-full text-xs border border-gray-200 dark:border-gray-600 rounded px-2 py-1.5 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200">
                  <option value="minimax/minimax-m2.5">MiniMax M2.5</option>
                  <option value="google/gemini-3-flash-preview">Gemini 3 Flash</option>
                  <option value="google/gemini-2.5-flash-preview">Gemini 2.5 Flash</option>
                  <option value="google/gemini-2.5-pro-preview">Gemini 2.5 Pro</option>
                  <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
                  <option value="anthropic/claude-haiku-4">Claude Haiku 4</option>
                  <option value="deepseek/deepseek-r1">DeepSeek R1</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">Query variants: {settings.n_variants}</label>
                <input type="range" min="1" max="8" value={settings.n_variants} onChange={(e) => setSettings({ ...settings, n_variants: parseInt(e.target.value) })} className="w-full" />
              </div>
              <div>
                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">Retrieval pool: {settings.n_retrieve}</label>
                <input type="range" min="10" max="50" value={settings.n_retrieve} onChange={(e) => setSettings({ ...settings, n_retrieve: parseInt(e.target.value) })} className="w-full" />
              </div>
              <div>
                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">Context nuggets: {settings.n_context}</label>
                <input type="range" min="4" max="30" value={settings.n_context} onChange={(e) => setSettings({ ...settings, n_context: parseInt(e.target.value) })} className="w-full" />
              </div>
              <div>
                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">Max per paper: {settings.max_per_paper}</label>
                <input type="range" min="1" max="10" value={settings.max_per_paper} onChange={(e) => setSettings({ ...settings, max_per_paper: parseInt(e.target.value) })} className="w-full" />
              </div>
              <div>
                <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">Rerank weight: {settings.rerank_weight.toFixed(1)}</label>
                <input type="range" min="0" max="10" value={Math.round(settings.rerank_weight * 10)} onChange={(e) => setSettings({ ...settings, rerank_weight: parseInt(e.target.value) / 10 })} className="w-full" />
              </div>
              <div className="border-t border-gray-100 dark:border-gray-700 pt-3">
                <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Year Filter</div>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">From</label>
                    <input type="number" value={settings.year_min} onChange={(e) => setSettings({ ...settings, year_min: e.target.value })} placeholder="2015" className="w-full text-xs border border-gray-200 dark:border-gray-600 rounded px-2 py-1.5 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200" />
                  </div>
                  <div className="flex-1">
                    <label className="text-xs text-gray-500 dark:text-gray-400 block mb-1">To</label>
                    <input type="number" value={settings.year_max} onChange={(e) => setSettings({ ...settings, year_max: e.target.value })} placeholder="2025" className="w-full text-xs border border-gray-200 dark:border-gray-600 rounded px-2 py-1.5 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200" />
                  </div>
                </div>
              </div>
              <div className="border-t border-gray-100 dark:border-gray-700 pt-3">
                <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Type Filter</div>
                <div className="flex flex-wrap gap-1">
                  {ALL_TYPES.map((t) => {
                    const active = !settings.type_filter || settings.type_filter.length === 0 || settings.type_filter.includes(t);
                    return (
                      <button
                        key={t}
                        onClick={() => {
                          setSettings((prev) => {
                            const current = prev.type_filter || [];
                            if (current.length === 0) {
                              // Currently showing all - click means show only this type
                              return { ...prev, type_filter: [t] };
                            } else if (current.includes(t) && current.length === 1) {
                              // Only this type selected - clear filter (show all)
                              return { ...prev, type_filter: [] };
                            } else if (current.includes(t)) {
                              return { ...prev, type_filter: current.filter((x) => x !== t) };
                            } else {
                              return { ...prev, type_filter: [...current, t] };
                            }
                          });
                        }}
                        className={`text-[10px] px-1.5 py-0.5 rounded transition-colors ${active ? TYPE_COLORS[t] : "bg-gray-100 dark:bg-gray-700 text-gray-300 dark:text-gray-600"}`}
                      >
                        {t}
                      </button>
                    );
                  })}
                  {settings.type_filter && settings.type_filter.length > 0 && (
                    <button
                      onClick={() => setSettings((prev) => ({ ...prev, type_filter: [] }))}
                      className="text-[10px] px-1.5 py-0.5 rounded text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
                    >
                      clear
                    </button>
                  )}
                </div>
              </div>
            </div>
          ) : (
            <StatsPanel apiBase={API_BASE} />
          )}
        </div>
      </div>

      {/* Main area */}
      <div className="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-gray-900" role="main">
        <div className="flex-1 overflow-y-auto px-6 py-4 chat-area" role="log" aria-label="Chat messages" aria-live="polite">
          {messages.length === 0 && (
            <div className="text-center text-gray-400 dark:text-gray-500 mt-20">
              <p className="text-lg mb-2">Ask a question about your thesis KB</p>
              <p className="text-sm mb-6">Mode: <strong className={mc.text}>{mode}</strong> &mdash; {MODES.find((m) => m.id === mode)?.desc}</p>
              {EXAMPLE_PROMPTS[mode] && (
                <div className="flex flex-wrap justify-center gap-2 max-w-xl mx-auto">
                  {EXAMPLE_PROMPTS[mode].map((prompt, i) => (
                    <button
                      key={i}
                      onClick={() => { setInput(prompt); if (textareaRef.current) textareaRef.current.focus(); }}
                      className="text-xs px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:bg-white dark:hover:bg-gray-800 hover:border-gray-300 dark:hover:border-gray-600 hover:text-gray-700 dark:hover:text-gray-300 transition-colors text-left"
                    >
                      {prompt}
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}
          {messages.map((msg, i) => <MessageBubble key={msg.id || i} msg={msg} mode={mode} bookmarks={bookmarks} setBookmarks={setBookmarks} onFollowUp={handleFollowUp} onRegenerate={msg.role === "assistant" ? (excluded, excludedPapers) => regenerateMessage(i, excluded, excludedPapers) : undefined} onRedo={msg.role === "assistant" ? (newMode) => regenerateMessage(i, [], [], newMode) : undefined} regenerating={regeneratingIdx === i} />)}
          {(streaming || regeneratingIdx !== null) && pipelineStage && <PipelineProgress stage={pipelineStage} />}
          {streaming && messages[messages.length - 1]?.content === "" && !pipelineStage && <TypingIndicator />}
          <div ref={chatEndRef} />
        </div>

        <div className="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-3 flex-shrink-0">
          <div className="max-w-4xl mx-auto">
            <div className={`input-wrapper border rounded-xl bg-white dark:bg-gray-800 ${streaming ? "opacity-60" : ""} ${input.trim() ? "border-gray-300 dark:border-gray-600" : "border-gray-200 dark:border-gray-700"}`}>
              {showPaperSearch && <PaperSearch pinnedPapers={pinnedPapers} setPinnedPapers={setPinnedPapers} onClose={() => setShowPaperSearch(false)} />}
              <PinnedPaperChips pinnedPapers={pinnedPapers} setPinnedPapers={setPinnedPapers} />
              <textarea
                ref={textareaRef}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                aria-label="Chat message input"
                placeholder={
                  mode === "review" || mode === "check" ? "Paste thesis text to review..."
                  : mode === "compare" ? "e.g. Compare SNN vs ANN for object detection..."
                  : mode === "draft" ? "e.g. Write about event camera motion compensation..."
                  : mode === "outline" ? "e.g. Related Work: Spiking Neural Networks..."
                  : "Ask a question about your thesis KB..."
                }
                rows="1"
                disabled={streaming}
                className="w-full px-4 pt-3 pb-1 text-sm bg-transparent dark:text-gray-200 disabled:opacity-50 chat-area"
                style={{ maxHeight: "200px", minHeight: "40px" }}
              />
              <div className="flex items-center justify-between px-3 pb-2">
                <div className="flex items-center gap-2">
                  <span className={`text-xs px-1.5 py-0.5 rounded ${mc.bg} ${mc.text} font-medium`}>
                    {MODES.find((m) => m.id === mode)?.label}
                  </span>
                  <button
                    onClick={() => setLatexMode(!latexMode)}
                    className={`text-xs px-1.5 py-0.5 rounded font-medium transition-colors ${latexMode ? "bg-orange-100 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400" : "bg-gray-100 dark:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"}`}
                    title={latexMode ? "LaTeX citations enabled" : "Enable LaTeX citations"}
                  >
                    LaTeX
                  </button>
                  <button
                    onClick={() => setRerankMode(!rerankMode)}
                    className={`text-xs px-1.5 py-0.5 rounded font-medium transition-colors ${rerankMode ? "bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400" : "bg-gray-100 dark:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"}`}
                    title={rerankMode ? "Cross-encoder reranking enabled" : "Enable cross-encoder reranking"}
                  >
                    Rerank
                  </button>
                  <button
                    onClick={() => setShowPaperSearch(!showPaperSearch)}
                    className={`text-xs px-1.5 py-0.5 rounded font-medium transition-colors ${showPaperSearch || pinnedPapers.length > 0 ? "bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400" : "bg-gray-100 dark:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"}`}
                    title={pinnedPapers.length > 0 ? `${pinnedPapers.length} paper(s) pinned` : "Pin papers to context"}
                  >
                    Pin{pinnedPapers.length > 0 ? ` (${pinnedPapers.length})` : ""}
                  </button>
                  {input.length > 0 && (
                    <span className={`text-xs ${input.length > 3000 ? "text-amber-500" : "text-gray-300 dark:text-gray-600"}`}>{input.length.toLocaleString()}</span>
                  )}
                </div>
                <div className="flex items-center gap-2">
                  {!streaming && <span className="text-xs text-gray-300 dark:text-gray-600 hidden sm:inline">Enter to send</span>}
                  {streaming ? (
                    <button onClick={stopStreaming} className="p-1.5 rounded-lg bg-red-500 text-white hover:bg-red-600 transition-colors" title="Stop generating">
                      <svg className="w-4 h-4" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="4" width="8" height="8" rx="1" /></svg>
                    </button>
                  ) : (
                    <button onClick={sendMessage} disabled={!input.trim()} className={`p-1.5 rounded-lg transition-colors ${input.trim() ? "bg-blue-600 text-white hover:bg-blue-700" : "bg-gray-100 dark:bg-gray-700 text-gray-300 dark:text-gray-600 cursor-not-allowed"}`} title="Send message">
                      <svg className="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8h10M9 4l4 4-4 4" /></svg>
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <ToastContainer toasts={toasts} removeToast={removeToast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
