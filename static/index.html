<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis KB</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; }
  .markdown-body h1 { font-size: 1.25rem; }
  .markdown-body h2 { font-size: 1.125rem; }
  .markdown-body h3 { font-size: 1rem; }
  .markdown-body p { margin-bottom: 0.5em; }
  .markdown-body ul, .markdown-body ol { margin-left: 1.5em; margin-bottom: 0.5em; }
  .markdown-body li { margin-bottom: 0.25em; }
  .markdown-body code { background: rgba(0,0,0,0.06); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
  .markdown-body pre { background: #1e293b; color: #e2e8f0; padding: 0.75em; border-radius: 6px; overflow-x: auto; margin-bottom: 0.5em; }
  .markdown-body pre code { background: none; padding: 0; color: inherit; }
  .markdown-body blockquote { border-left: 3px solid #94a3b8; padding-left: 0.75em; color: #64748b; margin-bottom: 0.5em; }
  .markdown-body table { border-collapse: collapse; margin-bottom: 0.5em; font-size: 0.85em; }
  .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 0.25em 0.5em; }
  .markdown-body th { background: #f1f5f9; font-weight: 600; }
  .markdown-body strong { font-weight: 700; }
  .typing-dot { animation: blink 1.4s infinite both; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
  .source-card:hover { background-color: #f8fafc; }
</style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const API_BASE = (() => {
  const params = new URLSearchParams(window.location.search);
  return params.get("api") || "http://localhost:8001";
})();

const MODES = [
  { id: "survey", label: "Survey", desc: "Literature review on a topic" },
  { id: "gaps", label: "Gaps", desc: "Find research gaps" },
  { id: "compare", label: "Compare", desc: "Compare methods/approaches" },
  { id: "check", label: "Check", desc: "Fact-check a paragraph" },
  { id: "cite", label: "Cite", desc: "Find supporting sources" },
];

function OverlapDots({ count, total }) {
  const colors = ["#9ca3af", "#3b82f6", "#f97316", "#22c55e"];
  return (
    <div className="flex gap-0.5 items-center">
      {Array.from({ length: total }, (_, i) => (
        <div
          key={i}
          className="w-2 h-2 rounded-full"
          style={{
            backgroundColor: i < count ? colors[Math.min(count - 1, 3)] : "#e5e7eb",
          }}
        />
      ))}
    </div>
  );
}

function SourceCard({ nugget }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div className="source-card border border-gray-200 rounded-lg p-3 text-xs">
      <div className="flex items-start justify-between gap-2 mb-1">
        <span className="font-bold text-gray-800 leading-snug flex-1">
          {nugget.paper_title || nugget.paper_id}
        </span>
        <span className="text-gray-500 whitespace-nowrap">{nugget.paper_year || "—"}</span>
      </div>
      <div className="flex items-center gap-2 mb-1.5">
        <OverlapDots count={nugget.overlap_count} total={nugget.n_variants} />
        <span className="text-gray-400">
          {nugget.overlap_count}/{nugget.n_variants} queries
        </span>
        <span className="text-gray-300">|</span>
        <span className="text-gray-400">score {nugget.rrf_score.toFixed(3)}</span>
        <span className="text-gray-300">|</span>
        <span className="px-1.5 py-0.5 rounded bg-gray-100 text-gray-600">{nugget.type}</span>
      </div>
      <button
        onClick={() => setExpanded(!expanded)}
        className="text-blue-500 hover:text-blue-700 text-xs"
      >
        {expanded ? "hide nugget" : "show nugget"}
      </button>
      {expanded && (
        <div className="mt-2 p-2 bg-gray-50 rounded text-gray-700 whitespace-pre-wrap leading-relaxed">
          {nugget.document}
        </div>
      )}
    </div>
  );
}

function SourcesPanel({ sources }) {
  const [open, setOpen] = useState(false);
  if (!sources || sources.length === 0) return null;
  return (
    <div className="mt-2">
      <button
        onClick={() => setOpen(!open)}
        className="text-xs text-gray-500 hover:text-gray-700 flex items-center gap-1"
      >
        <svg className={`w-3 h-3 transition-transform ${open ? "rotate-90" : ""}`} viewBox="0 0 12 12">
          <path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" strokeWidth="1.5" />
        </svg>
        {sources.length} sources
      </button>
      {open && (
        <div className="mt-2 grid grid-cols-1 md:grid-cols-2 gap-2">
          {sources.map((s, i) => (
            <SourceCard key={s.nugget_id || i} nugget={s} />
          ))}
        </div>
      )}
    </div>
  );
}

function TypingIndicator() {
  return (
    <div className="flex gap-1 p-3">
      <div className="typing-dot w-2 h-2 rounded-full bg-gray-400"></div>
      <div className="typing-dot w-2 h-2 rounded-full bg-gray-400"></div>
      <div className="typing-dot w-2 h-2 rounded-full bg-gray-400"></div>
    </div>
  );
}

function MessageBubble({ msg }) {
  const isUser = msg.role === "user";
  const htmlRef = useRef(null);

  useEffect(() => {
    if (!isUser && htmlRef.current) {
      htmlRef.current.innerHTML = marked.parse(msg.content || "");
    }
  }, [msg.content, isUser]);

  return (
    <div className={`flex ${isUser ? "justify-end" : "justify-start"} mb-3`}>
      <div className={`max-w-3xl ${isUser ? "ml-16" : "mr-16"}`}>
        <div
          className={`rounded-lg px-4 py-2.5 text-sm leading-relaxed ${
            isUser
              ? "bg-blue-600 text-white"
              : "bg-white border border-gray-200 text-gray-800"
          }`}
        >
          {isUser ? (
            <div className="whitespace-pre-wrap">{msg.content}</div>
          ) : (
            <div ref={htmlRef} className="markdown-body" />
          )}
        </div>
        {!isUser && msg.sources && <SourcesPanel sources={msg.sources} />}
      </div>
    </div>
  );
}

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [streaming, setStreaming] = useState(false);
  const [mode, setMode] = useState("survey");
  const [settings, setSettings] = useState({
    model: "google/gemini-flash-1.5",
    n_variants: 4,
    n_context: 8,
  });
  const [showSettings, setShowSettings] = useState(false);
  const [health, setHealth] = useState(null);
  const [error, setError] = useState(null);
  const chatEndRef = useRef(null);
  const textareaRef = useRef(null);
  const abortRef = useRef(null);

  // Scroll to bottom on new messages
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, streaming]);

  // Fetch health on mount
  useEffect(() => {
    fetch(`${API_BASE}/health`)
      .then((r) => r.json())
      .then(setHealth)
      .catch(() => setHealth({ status: "offline" }));
  }, []);

  // Auto-resize textarea
  useEffect(() => {
    if (textareaRef.current) {
      textareaRef.current.style.height = "auto";
      textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 200) + "px";
    }
  }, [input]);

  const handleModeChange = (newMode) => {
    if (newMode === mode) return;
    if (messages.length > 0 && !confirm("Start new conversation?")) return;
    setMode(newMode);
    setMessages([]);
    setError(null);
  };

  const sendMessage = useCallback(async () => {
    const text = input.trim();
    if (!text || streaming) return;

    const userMsg = { role: "user", content: text };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setStreaming(true);
    setError(null);

    // Add placeholder assistant message
    const assistantIdx = newMessages.length;
    setMessages((prev) => [...prev, { role: "assistant", content: "", sources: null }]);

    try {
      const controller = new AbortController();
      abortRef.current = controller;

      const resp = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
          mode,
          n_variants: settings.n_variants,
          n_retrieve: Math.max(settings.n_context, 12),
          n_context: settings.n_context,
          model: settings.model,
        }),
        signal: controller.signal,
      });

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(errData.detail || resp.statusText);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const jsonStr = line.slice(6);
          let parsed;
          try {
            parsed = JSON.parse(jsonStr);
          } catch {
            continue;
          }

          if (parsed.type === "delta") {
            setMessages((prev) => {
              const updated = [...prev];
              updated[assistantIdx] = {
                ...updated[assistantIdx],
                content: updated[assistantIdx].content + parsed.content,
              };
              return updated;
            });
          } else if (parsed.type === "sources") {
            setMessages((prev) => {
              const updated = [...prev];
              updated[assistantIdx] = {
                ...updated[assistantIdx],
                sources: parsed.nuggets,
              };
              return updated;
            });
          } else if (parsed.type === "error") {
            setError(parsed.content);
          }
        }
      }
    } catch (e) {
      if (e.name !== "AbortError") {
        setError(e.message);
      }
    } finally {
      setStreaming(false);
      abortRef.current = null;
    }
  }, [input, messages, streaming, mode, settings]);

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  const statusColor =
    health?.status === "ok"
      ? "bg-green-500"
      : health?.status === "degraded"
      ? "bg-yellow-500"
      : "bg-red-500";

  return (
    <div className="flex h-screen">
      {/* Sidebar */}
      <div className="w-56 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col">
        <div className="p-4 border-b border-gray-100">
          <h2 className="font-bold text-sm text-gray-700 mb-3">Mode</h2>
          <div className="space-y-1">
            {MODES.map((m) => (
              <button
                key={m.id}
                onClick={() => handleModeChange(m.id)}
                className={`w-full text-left px-3 py-2 rounded-md text-sm transition-colors ${
                  mode === m.id
                    ? "bg-blue-50 text-blue-700 font-semibold"
                    : "text-gray-600 hover:bg-gray-50"
                }`}
              >
                <div>{m.label}</div>
                <div className="text-xs text-gray-400 font-normal">{m.desc}</div>
              </button>
            ))}
          </div>
        </div>
        <div className="p-4">
          <button
            onClick={() => setShowSettings(!showSettings)}
            className="text-xs text-gray-500 hover:text-gray-700 flex items-center gap-1"
          >
            <svg className={`w-3 h-3 transition-transform ${showSettings ? "rotate-90" : ""}`} viewBox="0 0 12 12">
              <path d="M4 2l4 4-4 4" fill="none" stroke="currentColor" strokeWidth="1.5" />
            </svg>
            Settings
          </button>
          {showSettings && (
            <div className="mt-3 space-y-3">
              <div>
                <label className="text-xs text-gray-500 block mb-1">Model</label>
                <input
                  type="text"
                  value={settings.model}
                  onChange={(e) => setSettings({ ...settings, model: e.target.value })}
                  className="w-full text-xs border border-gray-200 rounded px-2 py-1.5"
                />
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">
                  Query variants: {settings.n_variants}
                </label>
                <input
                  type="range"
                  min="1"
                  max="6"
                  value={settings.n_variants}
                  onChange={(e) => setSettings({ ...settings, n_variants: parseInt(e.target.value) })}
                  className="w-full"
                />
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">
                  Context nuggets: {settings.n_context}
                </label>
                <input
                  type="range"
                  min="4"
                  max="16"
                  value={settings.n_context}
                  onChange={(e) => setSettings({ ...settings, n_context: parseInt(e.target.value) })}
                  className="w-full"
                />
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Main area */}
      <div className="flex-1 flex flex-col min-w-0">
        {/* Header */}
        <div className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
          <h1 className="font-bold text-gray-800">Thesis KB</h1>
          <div className="flex items-center gap-3 text-xs text-gray-500">
            {health && health.status !== "offline" && (
              <span>
                {health.papers?.toLocaleString()} papers &middot;{" "}
                {health.nuggets?.toLocaleString()} nuggets
              </span>
            )}
            <div className={`w-2 h-2 rounded-full ${statusColor}`} title={health?.status || "unknown"} />
          </div>
        </div>

        {/* Error banner */}
        {error && (
          <div className="bg-red-50 border-b border-red-200 px-6 py-2 text-sm text-red-700 flex items-center justify-between">
            <span>{error}</span>
            <button onClick={() => setError(null)} className="text-red-400 hover:text-red-600">&times;</button>
          </div>
        )}

        {/* Chat messages */}
        <div className="flex-1 overflow-y-auto px-6 py-4">
          {messages.length === 0 && (
            <div className="text-center text-gray-400 mt-20">
              <p className="text-lg mb-2">Ask a question about your thesis KB</p>
              <p className="text-sm">Mode: <strong>{mode}</strong> &mdash; {MODES.find((m) => m.id === mode)?.desc}</p>
            </div>
          )}
          {messages.map((msg, i) => (
            <MessageBubble key={i} msg={msg} />
          ))}
          {streaming && messages[messages.length - 1]?.content === "" && <TypingIndicator />}
          <div ref={chatEndRef} />
        </div>

        {/* Input bar */}
        <div className="border-t border-gray-200 bg-white p-4 flex-shrink-0">
          <div className="flex gap-3 max-w-4xl mx-auto">
            <textarea
              ref={textareaRef}
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="Ask a question... (Shift+Enter for newline)"
              rows="1"
              disabled={streaming}
              className="flex-1 resize-none border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:border-blue-400 disabled:opacity-50 disabled:bg-gray-50"
            />
            <button
              onClick={sendMessage}
              disabled={streaming || !input.trim()}
              className="px-4 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2"
            >
              {streaming ? (
                <svg className="animate-spin w-4 h-4" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="3" strokeDasharray="31.4 31.4" />
                </svg>
              ) : (
                "Send"
              )}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
