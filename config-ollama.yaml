paths:
  corpus_dir: corpus
  pdf_dir: ~/Documents/thesis-papers
  bib_file: ~/TDT4900-master-thesis/bibtex/bibliography.bib
  fetch_dir: corpus/fetched
  text_dir: corpus/texts
  chunk_dir: corpus/chunks
  nugget_dir: corpus/nuggets
  unified_dir: corpus/nuggets_unified
  kb_dir: kb

acquire:
  zotero_export: null
  enrich_s2: true
  dedup_threshold: 0.85

extract:
  ocr_fallback: true
  column_detection: true
  min_text_length: 100

chunk:
  token_size: 400
  overlap: 50
  tokenizer: cl100k_base
  respect_sections: true
  flex_pct: 0.15
  protect_blocks: true

nuggets:
  backend: ollama
  ollama:
    model: qwen3.5:9b
    base_url: http://127.0.0.1:11434/v1
  extraction:
    max_chunk_chars: 2000
    max_workers: 4
    max_retries: 3
    max_tokens: 3000
    temperature: 0.1
    retry_base_delay: 2.0
    nugget_types: [method, result, claim, limitation, comparison, background]

embed:
  backend: ollama
  ollama:
    model: qwen3-embedding:8b
    base_url: http://localhost:11434/v1
  embedding:
    batch_size: 64
    query_instruction: "Given an academic research claim about computer vision or neural networks, retrieve related findings and evidence"
    doc_instruction: "Represent this academic research finding for retrieval: a nugget containing methods, results, or claims from a computer vision or neural networks paper"
    instruction: "Given an academic research claim about computer vision or neural networks, retrieve related findings and evidence"
    # dimensions: 4096

store:
  chromadb:
    collection_name: thesis_nuggets
    distance_fn: cosine
  sqlite:
    db_name: nuggets.db

retrieval:
  rrf_k: 30
  section_boost: 1.15
  feedback_positive: 1.3
  feedback_negative: 0.5
  paper_feedback_step: 0.05
  paper_feedback_max: 0.3
  depth_fraction_weight: 0.3
  depth_abs_divisor: 5
  depth_abs_max: 0.3
  rerank_top_n: 60
  rerank_weight: 0.6
  rerank_timeout: 10
  max_workers: 8
  embed_cache_size: 256
  modes:
    background:
      n_retrieve: 25
      allowed_types: [background, method]
      preferred_sections: [abstract, introduction, background, related work]
      authority_boost: 1.5
      review_boost: 0.3
      max_per_paper: 2
    draft:
      n_retrieve: 25
      authority_boost: 1.0
      review_boost: 0.0
      max_per_paper: 3
    check:
      n_retrieve: 30
      preferred_sections: [results, experiments, methods, discussion]
      authority_boost: 1.2
      review_boost: 0.0
      max_per_paper: 4
    review:
      n_retrieve: 30
      preferred_sections: [results, experiments, methods, discussion]
      authority_boost: 1.2
      review_boost: 0.0
      max_per_paper: 4
    compare:
      n_retrieve: 25
      preferred_sections: [results, experiments, discussion, abstract]
      authority_boost: 1.0
      review_boost: 0.0
      max_per_paper: 3
    gaps:
      n_retrieve: 30
      preferred_sections: [discussion, conclusion, limitations, future work]
      authority_boost: 0.8
      review_boost: 0.2
      max_per_paper: 2
    outline:
      n_retrieve: 30
      authority_boost: 1.0
      review_boost: 0.1
      max_per_paper: 2
