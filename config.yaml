paths:
    corpus_dir: corpus
    pdf_dir: /cluster/work/ecschoye/thesis-papers
    bib_file: ~/TDT4900-master-thesis/bibtex/bibliography.bib
    fetch_dir: corpus/fetched # downloaded papers go here
    text_dir: corpus/texts
    chunk_dir: corpus/chunks
    nugget_dir: corpus/nuggets
    quality_dir: corpus/nuggets_quality
    augmented_dir: corpus/nuggets_augmented
    unified_dir: corpus/nuggets_unified
    kb_dir: kb

acquire:
    zotero_export: null
    enrich_s2: true
    dedup_threshold: 0.85

extract:
    ocr_fallback: true
    column_detection: true
    min_text_length: 100

chunk:
    token_size: 800
    overlap: 100
    tokenizer: cl100k_base
    respect_sections: true
    flex_pct: 0.15
    protect_blocks: true

nuggets:
    vllm:
        model: Qwen/Qwen3.5-27B
        port: 8000
        max_model_len: 4096
        gpu_memory_utilization: 0.90
        dtype: bfloat16
    extraction:
        max_workers: 32
        max_retries: 3
        max_tokens: 1500
        temperature: 0.1
        retry_base_delay: 2.0
        nugget_types:
            [method, result, claim, limitation, comparison, background]
    quality:
        batch_size: 5
        max_workers: 48
        max_tokens: 2000
        temperature: 0.0
        max_retries: 3
        retry_base_delay: 2.0
        flag_threshold: 2
    augmentation:
        max_workers: 32
        max_tokens: 2000
        temperature: 0.1
        max_retries: 3
        retry_base_delay: 2.0
        improve_threshold: 2 # overall score <= this triggers improvement
        gap_max_nuggets: 2 # chunks with <= this many nuggets get gap-filled
        gap_min_tokens: 100 # skip very short chunks
        gap_skip_sections: [references, acknowledgments, bibliography]
    unified:
        max_workers: 32
        flag_threshold: 2       # overall <= this -> removed from final output
        improve_threshold: 2    # overall <= this -> attempt improvement before removal

embed:
    backend: vllm # vllm (HPC) or ollama (local)
    vllm:
        model: Qwen/Qwen3-Embedding-8B
        port: 8000
        max_model_len: 1024
        gpu_memory_utilization: 0.90
        dtype: bfloat16
    ollama:
        model: qwen3-embedding:8b
        base_url: http://localhost:11434/v1
    embedding:
        batch_size: 64
        query_instruction: "Given an academic research claim about event cameras, RGB-Event fusion, spiking neural networks, or object detection for autonomous platforms, retrieve related findings and evidence"
        doc_instruction: "Represent this academic research finding for retrieval: a nugget containing methods, results, or claims about event cameras, RGB-Event fusion, spiking neural networks, or object detection"
        instruction: "Given an academic research claim about event cameras, RGB-Event fusion, spiking neural networks, or object detection for autonomous platforms, retrieve related findings and evidence"
        # dimensions: 4096  # Qwen3-Embedding-8B doesn't support matryoshka; uses native 4096 dims

store:
    chromadb:
        collection_name: thesis_nuggets
        distance_fn: cosine
    sqlite:
        db_name: nuggets.db

retrieval:
    rrf_k: 30                    # RRF constant (higher = more weight to lower ranks)
    section_boost: 1.15          # multiplier for nuggets in preferred sections
    feedback_positive: 1.3       # multiplier for positively-rated nuggets
    feedback_negative: 0.5       # multiplier for negatively-rated nuggets
    paper_feedback_step: 0.05    # per-rating increment for paper-level feedback
    paper_feedback_max: 0.3      # max paper-level feedback boost
    depth_fraction_weight: 0.3   # weight of hit-fraction in depth-of-coverage
    depth_abs_divisor: 5         # divisor for log2(hits) absolute boost
    depth_abs_max: 0.3           # max absolute depth boost
    rerank_top_n: 60             # candidates to send to cross-encoder
    rerank_weight: 0.6           # blend weight (0=RRF only, 1=reranker only)
    rerank_timeout: 10           # seconds before falling back to RRF-only
    max_workers: 8               # ThreadPoolExecutor workers
    embed_cache_size: 256        # LRU cache entries for query embeddings
    modes:
        background:
            n_retrieve: 25
            allowed_types: [background, method]
            preferred_sections: [abstract, introduction, background, related work]
            authority_boost: 1.5
            review_boost: 0.3
            max_per_paper: 2
        draft:
            n_retrieve: 25
            authority_boost: 1.0
            review_boost: 0.0
            max_per_paper: 3
        check:
            n_retrieve: 30
            preferred_sections: [results, experiments, methods, discussion]
            authority_boost: 1.2
            review_boost: 0.0
            max_per_paper: 4
        review:
            n_retrieve: 30
            preferred_sections: [results, experiments, methods, discussion]
            authority_boost: 1.2
            review_boost: 0.0
            max_per_paper: 4
        compare:
            n_retrieve: 25
            preferred_sections: [results, experiments, discussion, abstract]
            authority_boost: 1.0
            review_boost: 0.0
            max_per_paper: 3
        gaps:
            n_retrieve: 30
            preferred_sections: [discussion, conclusion, limitations, future work]
            authority_boost: 0.8
            review_boost: 0.2
            max_per_paper: 2
        outline:
            n_retrieve: 30
            authority_boost: 1.0
            review_boost: 0.1
            max_per_paper: 2
